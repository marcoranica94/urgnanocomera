services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - DATABASE_URI=${DATABASE_URI:-file:/app/data/urgnanocomera.db}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
    volumes:
      # Fase A: persistenza SQLite e media su disco locale
      - ./data:/app/data
      - ./public/media:/app/public/media
    restart: unless-stopped

