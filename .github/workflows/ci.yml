name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'ci-only-secret' }}
          DATABASE_URI: file:./data/ci-test.db
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
        run: npm run build
