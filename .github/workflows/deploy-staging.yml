name: Deploy Staging

# Railway ascolta direttamente il branch 'develop' via GitHub Integration.
# Questo workflow verifica che il sito staging risponda dopo ogni deploy.

on:
  push:
    branches: [develop]

jobs:
  healthcheck:
    name: Health check staging
    runs-on: ubuntu-latest
    # Attende che Railway finisca il deploy (solitamente 2-4 min)
    if: ${{ vars.STAGING_URL != '' }}

    steps:
      - name: Attendi deploy Railway
        run: sleep 180

      - name: Verifica risposta HTTP
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Staging non risponde correttamente (HTTP $STATUS)"
            exit 1
          fi
          echo "Staging online: ${{ vars.STAGING_URL }}"
